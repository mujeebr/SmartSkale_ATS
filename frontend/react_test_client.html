<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Resume Matcher React Test Client</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e5e7eb;
      }
      .app {
        max-width: 960px;
        margin: 0 auto;
        background: #020617;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.7);
        border: 1px solid #1f2937;
      }
      textarea {
        width: 100%;
        min-height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        resize: vertical;
      }
      input[type="file"] {
        margin-top: 8px;
      }
      button {
        background: #4f46e5;
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 600;
        margin-right: 8px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        margin-bottom: 18px;
      }
      .results {
        margin-top: 16px;
        padding: 16px;
        border-radius: 10px;
        background: #020617;
        border: 1px solid #1d4ed8;
      }
      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: #1d4ed8;
        font-size: 12px;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const DEFAULT_API_BASE =
        "http://ec2-3-107-104-106.ap-southeast-2.compute.amazonaws.com:8000";

      function App() {
        const [apiBase, setApiBase] = React.useState(DEFAULT_API_BASE);
        const [jdText, setJdText] = React.useState("");
        const [resumeText, setResumeText] = React.useState("");
        const [files, setFiles] = React.useState([]);
        const [loading, setLoading] = React.useState(false);
        const [result, setResult] = React.useState(null);
        const [error, setError] = React.useState(null);

        const handleTextMatch = async () => {
          setLoading(true);
          setError(null);
          setResult(null);
          try {
            const formData = new FormData();
            formData.append("jd_text", jdText);
            formData.append("resume_text", resumeText);
            const resp = await fetch(apiBase + "/match", {
              method: "POST",
              body: formData,
            });
            if (!resp.ok) {
              throw new Error("HTTP " + resp.status);
            }
            const data = await resp.json();
            setResult(data);
          } catch (e) {
            setError(e.message || String(e));
          } finally {
            setLoading(false);
          }
        };

        const handleFilesMatch = async () => {
          setLoading(true);
          setError(null);
          setResult(null);
          try {
            const formData = new FormData();
            formData.append("jd_text", jdText);
            for (const file of files) {
              formData.append("files", file);
            }
            const resp = await fetch(apiBase + "/match-files", {
              method: "POST",
              body: formData,
            });
            if (!resp.ok) {
              throw new Error("HTTP " + resp.status);
            }
            const data = await resp.json();
            setResult(data);
          } catch (e) {
            setError(e.message || String(e));
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="app">
            <h1>
              Resume Matcher Test UI <span className="badge">React</span>
            </h1>
            <div className="row">
              <label>
                API base URL
                <br />
                <input
                  style={{
                    width: "100%",
                    padding: "8px",
                    marginTop: "4px",
                    borderRadius: "8px",
                    border: "1px solid #4b5563",
                    background: "#020617",
                    color: "#e5e7eb",
                  }}
                  value={apiBase}
                  onChange={(e) => setApiBase(e.target.value)}
                />
              </label>
            </div>
            <div className="row">
              <label>
                Job description text
                <textarea
                  value={jdText}
                  onChange={(e) => setJdText(e.target.value)}
                  placeholder="Paste the JD here..."
                />
              </label>
            </div>
            <div className="row">
              <label>
                Resume text (for /match)
                <textarea
                  value={resumeText}
                  onChange={(e) => setResumeText(e.target.value)}
                  placeholder="Paste resume text here if you want to use /match"
                />
              </label>
            </div>
            <div className="row">
              <label>
                Resume files (for /match-files)
                <br />
                <input
                  multiple
                  type="file"
                  onChange={(e) => setFiles(Array.from(e.target.files || []))}
                />
              </label>
            </div>
            <div className="row">
              <button disabled={loading} onClick={handleTextMatch}>
                Call /match (text only)
              </button>
              <button disabled={loading || files.length === 0} onClick={handleFilesMatch}>
                Call /match-files (upload files)
              </button>
              {loading && <span style={{ marginLeft: 12 }}>Calling API...</span>}
            </div>
            {error && (
              <div className="results" style={{ borderColor: "#b91c1c" }}>
                <strong style={{ color: "#fecaca" }}>Error:</strong>
                <pre>{error}</pre>
              </div>
            )}
            {result && (
              <div className="results">
                <strong>Response JSON:</strong>
                <pre>{JSON.stringify(result, null, 2)}</pre>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
